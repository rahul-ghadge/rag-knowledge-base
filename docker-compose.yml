version: '3.9'

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ragdb
      POSTGRES_USER:     raguser
      POSTGRES_PASSWORD: ragpassword
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-knowledge-base-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_NAME:        ragdb
      DB_USERNAME:    raguser
      DB_PASSWORD:    ragpassword
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      SERVER_PORT:    8080
      UPLOAD_PATH:    /app/uploads
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    networks:
      - rag-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rag-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@company.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - rag-network

volumes:
  postgres_data:
  app_uploads:
  app_logs:

networks:
  rag-network:
    driver: bridge
